<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPEC Ensino | Administração</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="css/ensino-admin.css">

</head>


<body>


<div class="admin-container">



<!-- SIDEBAR -->

<aside class="sidebar">


<div class="brand">

    <img src="img/logo.png" alt="IPEC">

    <img src="img/logo-ensino.png" alt="IPEC Ensino">

</div>




<nav class="menu">

<button
id="btn-matriculas"
class="active">

Matrículas

</button>


<button
id="btn-usuarios">

Usuários

</button>

</nav>




<a href="ensino.html" class="back">

Voltar ao Ensino

</a>


</aside>






<!-- CONTEÚDO -->


<main class="content">



<header class="top">


<div>

<p>Painel administrativo</p>

<h1>
Gestão de Matrículas
</h1>

</div>




<div class="profile">

Administrador Geral

</div>


</header>







<section id="matriculas-section" class="page-section">

<div class="panel">

<h2>Nova Matrícula</h2>

<form id="form-matricula">

<div class="form-grid">

<div class="campo">
<label>Nome Completo</label>
<input type="text" id="nome-matricula" required>
</div>

<div class="campo">
<label>Email</label>
<input type="email" id="email-matricula" required>
</div>

<div class="campo">
<label>Telefone</label>
<input type="text" id="telefone-matricula">
</div>

<div class="campo">
<label>Tipo</label>

<select id="tipo-matricula">

<option value="aluno">Aluno</option>

<option value="professor">Professor</option>

</select>

</div>

<div class="campo">
<label>Status</label>

<select id="status-matricula">

<option value="Ativo">Ativo</option>

<option value="Pendente">Pendente</option>

<option value="Cancelado">Cancelado</option>

<option value="Concluído">Concluído</option>

</select>

</div>

</div>

<button type="submit">

Cadastrar Matrícula

</button>

</form>

</div>

<div class="panel">

<h2>Lista de Matrículas</h2>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar matrícula...">

<table>

<thead>

<tr>

<th>Matrícula</th>
<th>Nome</th>
<th>Tipo</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="lista-matriculas">

</tbody>

</table>

</div>

</section>

<!-- ========================= -->
<!-- USUÁRIOS -->
<!-- ========================= -->

<section
id="usuarios-section"
class="page-section"
style="display:none;">


<div class="panel">

<h2>
Usuários do Sistema
</h2>

<p>

Aqui serão exibidos todos os usuários que possuem acesso ao sistema.

</p>


<div id="lista-usuarios">

Nenhum usuário cadastrado.

</div>


</div>


</section>




</main>








<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/matriculas.js"></script>

<script src="js/admin.js"></script>



</body>

</html>
