<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPEC Ensino | Administração</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="css/ensino-admin.css">

</head>


<body>


<div class="admin-container">



<!-- SIDEBAR -->

<aside class="sidebar">


<div class="brand">

    <img src="img/logo.png" alt="IPEC">

    <img src="img/logo-ensino.png" alt="IPEC Ensino">

</div>


<nav class="menu">


<button class="active">

Usuários

</button>


</nav>



<a href="ensino.html" class="back">

Voltar ao Ensino

</a>


</aside>





<!-- CONTEÚDO -->

<main class="content">



<header class="top">


<div>

<p>Painel administrativo</p>

<h1>
Gestão de Usuários
</h1>

</div>



<div class="profile">

Administrador Geral

</div>


</header>





<section class="usuarios-container">



<div class="panel">


<h2>
Cadastrar usuário
</h2>



<form id="form-usuario">



<div class="input-group">

<label>
Nome completo
</label>

<input 
type="text"
id="nome-usuario"
placeholder="Digite o nome"
required>

</div>




<div class="input-group">

<label>
Email
</label>

<input 
type="email"
id="email-usuario"
placeholder="Digite o email"
required>

</div>




<div class="input-group">

<label>
Telefone
</label>

<input 
type="text"
id="telefone-usuario"
placeholder="(00) 00000-0000">

</div>




<div class="input-group">

<label>
Tipo de usuário
</label>


<select id="tipo-usuario">


<option value="aluno">
Aluno
</option>


<option value="professor">
Professor
</option>


<option value="admin">
Administrador
</option>


</select>


</div>




<button class="btn-primary">

Cadastrar usuário

</button>



</form>



</div>







<div class="panel">


<h2>
Usuários cadastrados
</h2>



<div id="lista-usuarios">


Nenhum usuário cadastrado


</div>



</div>



</section>



</main>


</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/usuarios.js"></script>


</body>

</html>
